<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<h1 id="title"></h1>

<div id="modules"></div>

<script>
const params = new URLSearchParams(window.location.search);
const course = params.get("course");

document.getElementById("title").innerText = course;

let content = "";

for(let i=1; i<=5; i++){
  content += `
    <div class="card">
      <h3>Module ${i}</h3>
      <button onclick="alert('Practice ${i}')">Practice</button>
      <button onclick="alert('Quiz ${i}')">Quiz</button>
    </div>
  `;
}

document.getElementById("modules").innerHTML = content;
</script>

</body>
</html>
