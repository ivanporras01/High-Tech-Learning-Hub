const params = new URLSearchParams(window.location.search);
const courseName = params.get("course") || "Coding Fundamentals";
document.getElementById("courseTitle").innerText = courseName;

const courseKey = "progress_" + courseName.replace(/\s+/g, "_");

let progress = JSON.parse(localStorage.getItem(courseKey)) || {
  completedModules: [],
  quizScores: {}
};

const courseFolders = {
  "Coding Fundamentals": "coding-fundamentals",
  "Robotics & Electronics": "robotics-electronics",
  "AI & Digital Creativity": "ai-digital-creativity",
  "Quantum Computing Foundations": "quantum-computing-foundations",

  "AI for Professionals": "ai-for-professionals",

};

const courseContent = {
  "Coding Fundamentals": [
    ["Introduction to Programming", "Learn what programming is and how computers follow instructions."],
    ["Variables and Data Types", "Store and manage information."],
    ["If Statements", "Make decisions using logic."],
    ["Loops", "Repeat actions efficiently."],
    ["Mini Project", "Build your first simple program."]
  ]
};

const selectedCourseModules = courseContent[courseName] || courseContent["Coding Fundamentals"];
const courseFolder = courseFolders[courseName] || "coding-fundamentals";
const videos = courseVideos[courseName] || courseVideos["Coding Fundamentals"];

const courseModules = selectedCourseModules.map((item, index) => {
  const moduleNumber = index + 1;

  return {
    title: "Module " + moduleNumber + ": " + item[0],
    lesson: item[1],
    videoId: videos[index],
    folder: "../content/" + courseFolder + "/module" + moduleNumber + "/",
    colab: "https://colab.research.google.com/#create=true"
  };
});

function renderModules() {
  const container = document.getElementById("modulesContainer");
  container.innerHTML = "";

  courseModules.forEach((module, index) => {

    const moduleNumber = index + 1;

    container.innerHTML += `
      <div class="card module-card">
        <h3>${module.title}</h3>

        <h4>Lesson Overview</h4>
        <p>${module.lesson}</p>

        <h4>Step 1</h4>
        <a class="material-button" href="${module.folder}lesson.pdf" target="_blank">📘 Full Lesson</a>

        <h4>Step 2</h4>
        <a class="material-button" href="${module.folder}summary.pdf" target="_blank">🧾 Quick Summary</a>

        <h4>Step 3: Video</h4>
        <iframe width="100%" height="250"
          src="https://www.youtube.com/embed/${module.videoId}"
          frameborder="0" allowfullscreen>
        </iframe>

        <h4>Step 4</h4>
        <a class="material-button" href="${module.colab}" target="_blank">💻 Practice Lab</a>

      </div>
    `;
  });
}

renderModules();
