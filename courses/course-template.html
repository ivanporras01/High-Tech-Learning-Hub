<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course | STEM Learning Hub</title>
  <link rel="stylesheet" href="../styles.css"/>
</head>

<body>

<header class="main-header">
  <h1 id="courseTitle">Course</h1>
  <p class="statement">Lessons, summaries, videos, labs, quizzes, and progress tracking.</p>
</header>

<section class="hero">
  <h2 id="progressTitle">Course Progress: 0%</h2>
  <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
</section>

<section class="container">
  <div id="modulesContainer" class="modules"></div>
</section>

<script>

/* VIDEO LIBRARY */
const courseVideos = {
  "Coding Fundamentals": ["I2wURDqiXdM","rfscVS0vtbw","f4KOjWS_KZs","6iF8Xb7Z3wQ","8ext9G7xspg"]
};

/* COURSE CONTENT */
const courseContent = {
  "Coding Fundamentals": [
    ["Intro to Programming","Understand programming basics"],
    ["Variables","Learn variables"],
    ["If Statements","Decision making"],
    ["Loops","Repetition"],
    ["Project","Build program"]
  ]
};

const courseName = "Coding Fundamentals";
const videos = courseVideos[courseName];
const modules = courseContent[courseName];

let progress = JSON.parse(localStorage.getItem("progress")) || {
  completed: [],
  scores: {}
};

function createQuiz(title){
  return [
    {q:"Main focus?",a:title,o:[title,"Wrong","Wrong2","Wrong3"]},
    {q:"Why learn?",a:"Apply knowledge",o:["Apply knowledge","Skip","Ignore","None"]},
    {q:"Step 1?",a:"Read PDF",o:["Read PDF","Skip","Ignore","None"]},
    {q:"Step 4?",a:"Practice",o:["Practice","Skip","Ignore","None"]},
    {q:"Finish?",a:"Take quiz",o:["Take quiz","Ignore","Skip","None"]}
  ];
}

function render(){
  const container = document.getElementById("modulesContainer");
  container.innerHTML = "";

  modules.forEach((m,i)=>{
    const quiz = createQuiz(m[0]);

    let quizHTML = "";

    quiz.forEach((q,qi)=>{
      quizHTML += `
      <div class="quiz-question">
        <p>${q.q}</p>
        ${q.o.map(o=>`
          <label class="quiz-option">
            <input type="radio" name="m${i}_q${qi}" value="${o}">${o}
          </label>`).join("")}
      </div>`;
    });

    container.innerHTML += `
    <div class="card module-card">

      <h3>Module ${i+1}: ${m[0]}</h3>
      <p>${m[1]}</p>

      <a href="../content/coding-fundamentals/module${i+1}/lesson.pdf" class="material-button" target="_blank">📘 Lesson</a>
      <a href="../content/coding-fundamentals/module${i+1}/summary.pdf" class="material-button" target="_blank">🧾 Summary</a>

      <iframe width="100%" height="250" src="https://www.youtube.com/embed/${videos[i]}"></iframe>

      <a href="https://colab.research.google.com" class="material-button" target="_blank">💻 Practice</a>

      <button onclick="toggleQuiz(${i})">📝 Start Quiz</button>

      <div id="quiz${i}" style="display:none;">
        ${quizHTML}
        <button onclick="grade(${i})">Submit Quiz</button>
        <p id="score${i}"></p>
      </div>

    </div>`;
  });
}

function toggleQuiz(i){
  const el = document.getElementById("quiz"+i);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function grade(i){
  let correct = 0;
  const quiz = createQuiz(modules[i][0]);

  quiz.forEach((q,qi)=>{
    const sel = document.querySelector(`input[name="m${i}_q${qi}"]:checked`);
    if(sel && sel.value===q.a) correct++;
  });

  const score = Math.round(correct/5*100);
  document.getElementById("score"+i).innerText = "Score: "+score+"%";

  if(score>=70){
    alert("Passed!");
  }else{
    alert("Try again");
  }
}

render();

</script>

</body>
</html>
