<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course | STEM Learning Hub</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>

<header class="main-header">
  <h1 id="courseTitle">Course</h1>
  <p class="statement">Lessons, PDFs, slides, videos, coding labs, quizzes, and progress tracking.</p>

  <nav class="main-menu">
    <a href="../index.html">Home</a>
    <a href="../pages/dashboard.html">Dashboard</a>
    <a href="../pages/precollege.html">Pre-College</a>
    <a href="../pages/college.html">College</a>
    <a href="../pages/adult.html">Adult Education</a>
  </nav>
</header>

<section class="hero">
  <h2 id="progressTitle">Course Progress: 0%</h2>
  <p id="progressMessage">Start Module 1 to begin your learning journey.</p>
</section>

<section class="container">
  <div id="modulesContainer" class="modules"></div>
</section>

<footer>
  <p>© 2026 STEM Learning Hub | Developed by Professor Porras</p>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const courseName = params.get("course") || "Coding Fundamentals";
document.getElementById("courseTitle").innerText = courseName;

const courseKey = "progress_" + courseName.replace(/\s+/g, "_");

let progress = JSON.parse(localStorage.getItem(courseKey)) || {
  completedModules: [],
  quizScores: {}
};

const courseFolders = {
  "Coding Fundamentals": "coding-fundamentals",
  "Robotics & Electronics": "robotics-electronics",
  "AI & Digital Creativity": "ai-digital-creativity",
  "Quantum Computing Foundations": "quantum-computing-foundations",
  "IoT & Embedded Systems": "iot-embedded-systems",
  "Fundamentals of Telecommunications": "telecommunications-fundamentals",
  "AI for Professionals": "ai-for-professionals",
  "Cloud & Digital Infrastructure": "cloud-digital-infrastructure",
  "Technology Project Management": "technology-project-management"
};

const courseContent = {
  "Coding Fundamentals": [
    ["Introduction to Programming", "Learn what programming is, why it matters, and how computers follow instructions."],
    ["Variables and Data Types", "Learn how to store information using variables such as text, numbers, and logical values."],
    ["Decision Making with If Statements", "Learn how programs make decisions using conditions and logic."],
    ["Loops and Repetition", "Learn how to repeat actions efficiently using loops."],
    ["Mini Coding Project", "Combine variables, input, conditions, and loops to build a simple program."]
  ],

  "Robotics & Electronics": [
    ["Introduction to Robotics", "Explore what robots are and how they sense, think, and act."],
    ["Basic Electronics", "Learn about circuits, power, voltage, current, and basic components."],
    ["Sensors and Inputs", "Understand how robots collect information from the environment."],
    ["Motors and Outputs", "Learn how robots move and respond using motors and actuators."],
    ["Robotics Mini Project", "Design a simple robot concept using sensors, motors, and control logic."]
  ],

  "AI & Digital Creativity": [
    ["What Is Artificial Intelligence?", "Understand AI, machine learning, and how intelligent systems are used today."],
    ["Prompt Engineering Basics", "Learn how to write clear prompts to get better results from AI tools."],
    ["Creative AI Tools", "Explore how AI can help generate text, images, ideas, and learning resources."],
    ["Responsible AI Use", "Learn about accuracy, bias, ethics, and responsible use of AI."],
    ["AI Creative Project", "Create a digital project using AI tools and explain your process."]
  ],

  "Quantum Computing Foundations": [
    ["Introduction to Quantum Computing", "Learn why quantum computing is different from classical computing."],
    ["Qubits and Superposition", "Understand qubits, states, and the idea of superposition."],
    ["Quantum Gates and Circuits", "Explore how quantum gates modify qubits in a quantum circuit."],
    ["Quantum Algorithms and Applications", "Learn where quantum computing may impact science, security, and optimization."],
    ["Quantum Mini Project", "Create or simulate a simple quantum circuit and explain the results."]
  ],

  "IoT & Embedded Systems": [
    ["Introduction to IoT", "Learn how devices connect, collect data, and communicate over networks."],
    ["Microcontrollers and Sensors", "Understand microcontrollers, sensors, and embedded systems."],
    ["Communication Protocols", "Explore WiFi, Bluetooth, MQTT, and how devices exchange data."],
    ["Cloud Dashboards", "Learn how IoT data can be sent to dashboards and cloud platforms."],
    ["IoT System Project", "Design a smart device solution using sensors, connectivity, and data."]
  ],

  "Fundamentals of Telecommunications": [
    ["Introduction to Telecommunications", "Understand communication systems and how information travels."],
    ["Signals and Transmission", "Learn about analog, digital, wired, and wireless transmission."],
    ["Networking Basics", "Explore IP addresses, routers, switches, and basic internet structure."],
    ["Wireless and Mobile Systems", "Learn about WiFi, cellular networks, 4G, 5G, and future networks."],
    ["Telecommunications Project", "Design a basic communication system and explain its components."]
  ],

  "AI for Professionals": [
    ["AI in the Workplace", "Learn how AI tools are changing productivity, communication, and workflows."],
    ["Prompting for Productivity", "Create prompts for emails, summaries, planning, and analysis."],
    ["AI Automation Basics", "Understand how AI can support repetitive tasks and business processes."],
    ["AI Ethics and Accuracy", "Learn how to evaluate AI outputs and use AI responsibly."],
    ["Professional AI Project", "Design an AI workflow that solves a real professional problem."]
  ],

  "Cloud & Digital Infrastructure": [
    ["Introduction to Cloud Computing", "Understand cloud services and why organizations use the cloud."],
    ["Cloud Service Models", "Learn the basics of IaaS, PaaS, SaaS, and cloud deployment."],
    ["Storage, Databases, and Security", "Explore cloud storage, databases, access control, and security basics."],
    ["Deploying Applications", "Learn how websites and applications are hosted online."],
    ["Cloud Infrastructure Project", "Design a basic cloud solution for a real-world use case."]
  ],

  "Technology Project Management": [
    ["Introduction to Tech Project Management", "Learn how technology projects are planned, organized, and delivered."],
    ["Agile and Scrum Basics", "Understand sprints, roles, backlogs, and iterative development."],
    ["Planning and Communication", "Learn how to define goals, timelines, stakeholders, and risks."],
    ["Managing Technical Teams", "Explore leadership, collaboration, and decision-making in tech teams."],
    ["Final Project Plan", "Create a technology project plan with scope, timeline, tasks, and deliverables."]
  ]
};

function createQuiz(moduleTitle) {
  return [
    {
      question: "What is the main focus of this module?",
      options: [moduleTitle, "Billing only", "Skipping the course", "Changing the website color"],
      answer: moduleTitle
    },
    {
      question: "Why is practice important in this module?",
      options: ["It helps apply learning", "It replaces all lessons", "It removes quizzes", "It is not useful"],
      answer: "It helps apply learning"
    },
    {
      question: "What should students do after reviewing the lesson materials?",
      options: ["Complete the practice and quiz", "Close the course", "Ignore the module", "Delete progress"],
      answer: "Complete the practice and quiz"
    }
  ];
}

const selectedCourseModules = courseContent[courseName] || courseContent["Coding Fundamentals"];
const courseFolder = courseFolders[courseName] || "coding-fundamentals";

const courseModules = selectedCourseModules.map((item, index) => {
  const moduleNumber = index + 1;
  return {
    title: "Module " + moduleNumber + ": " + item[0],
    lesson: item[1],
    folder: "../content/" + courseFolder + "/module" + moduleNumber + "/",
    colab: "https://colab.research.google.com/#create=true",
    sampleCode:
`# ${courseName} - Module ${moduleNumber}
print("Welcome to ${courseName}")
print("This is Module ${moduleNumber}: ${item[0]}")`,
    quiz: createQuiz(item[0])
  };
});

function renderModules() {
  const container = document.getElementById("modulesContainer");
  container.innerHTML = "";

  courseModules.forEach((module, index) => {
    const moduleNumber = index + 1;
    const isCompleted = progress.completedModules.includes(moduleNumber);
    const score = progress.quizScores[moduleNumber];

    let quizHTML = "";

    module.quiz.forEach((q, qIndex) => {
      quizHTML += `
        <div class="quiz-question">
          <p><strong>Question ${qIndex + 1}:</strong> ${q.question}</p>
          ${q.options.map(option => `
            <label>
              <input type="radio" name="module${moduleNumber}_q${qIndex}" value="${option}">
              ${option}
            </label><br>
          `).join("")}
        </div>
      `;
    });

    container.innerHTML += `
      <div class="card module-card">
        <h3>${module.title}</h3>

        <h4>Lesson Overview</h4>
        <p>${module.lesson}</p>

        <h4>Lesson Materials</h4>
        <a class="material-button" href="${module.folder}lesson.pdf" target="_blank">Open Lesson PDF</a>
        <a class="material-button" href="${module.folder}slides.pptx" target="_blank">Download PPT Slides</a>
        <a class="material-button" href="${module.folder}video.txt" target="_blank">Open Video Link</a>

        <h4>Practice Lab</h4>
        <p>Use Google Colab to complete the practice activity for this module.</p>
        <a class="material-button" href="${module.colab}" target="_blank">Open Google Colab Lab</a>

        <h4>Sample Starter Code</h4>
        <pre>${module.sampleCode}</pre>

        <h4>Graded Quiz</h4>
        ${quizHTML}

        <button onclick="gradeQuiz(${moduleNumber})">Submit Quiz</button>
        <button onclick="markComplete(${moduleNumber})">Mark Module Complete</button>

        <p id="score${moduleNumber}">
          ${score !== undefined ? "Quiz Score: " + score + "%" : "Quiz Score: Not submitted yet"}
        </p>

        <p>Status: <strong>${isCompleted ? "Completed" : "Not Completed"}</strong></p>
      </div>
    `;
  });

  updateProgress();
}

function gradeQuiz(moduleNumber) {
  const module = courseModules[moduleNumber - 1];
  let correct = 0;

  module.quiz.forEach((q, qIndex) => {
    const selected = document.querySelector(`input[name="module${moduleNumber}_q${qIndex}"]:checked`);
    if (selected && selected.value === q.answer) {
      correct++;
    }
  });

  const score = Math.round((correct / module.quiz.length) * 100);
  progress.quizScores[moduleNumber] = score;
  localStorage.setItem(courseKey, JSON.stringify(progress));

  document.getElementById("score" + moduleNumber).innerText = "Quiz Score: " + score + "%";

  if (score >= 70) {
    alert("Great job! You passed this quiz with " + score + "%.");
  } else {
    alert("You scored " + score + "%. Please review the lesson and try again.");
  }

  updateProgress();
}

function markComplete(moduleNumber) {
  const score = progress.quizScores[moduleNumber];

  if (score === undefined) {
    alert("Please submit the quiz before marking this module complete.");
    return;
  }

  if (score < 70) {
    alert("You need at least 70% to complete this module.");
    return;
  }

  if (!progress.completedModules.includes(moduleNumber)) {
    progress.completedModules.push(moduleNumber);
  }

  localStorage.setItem(courseKey, JSON.stringify(progress));
  renderModules();
}

function updateProgress() {
  const completed = progress.completedModules.length;
  const total = courseModules.length;
  const percent = Math.round((completed / total) * 100);

  document.getElementById("progressTitle").innerText = "Course Progress: " + percent + "%";

  if (percent === 0) {
    document.getElementById("progressMessage").innerText = "Start Module 1 to begin your learning journey.";
  } else if (percent < 100) {
    document.getElementById("progressMessage").innerText = completed + " of " + total + " modules completed.";
  } else {
    document.getElementById("progressMessage").innerText = "Congratulations! You completed this course.";
  }
}

renderModules();
</script>

</body>
</html>
