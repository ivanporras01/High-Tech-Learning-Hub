<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course</title>
  <link rel="stylesheet" href="../styles.css">

  <style>
    .container {
      text-align: center;
      padding: 30px;
    }

    .modules {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #122b44;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,224,255,0.3);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #00e0ff;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #00bcd4;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="courseTitle">Course Name</h1>
  <p>Welcome to this course. Select a module below.</p>

  <div class="modules" id="modulesContainer"></div>

</div>

<script>
  // Get course name from URL
  const params = new URLSearchParams(window.location.search);
  const course = params.get("course") || "Course";

  document.getElementById("courseTitle").innerText = course;

  // Generate 5 Modules dynamically
  let content = "";

  for (let i = 1; i <= 5; i++) {
    content += `
      <div class="card">
        <h3>Module ${i}</h3>
        <p>Lesson content for Module ${i}</p>
        <button onclick="openPractice(${i})">Practice</button>
        <button onclick="openQuiz(${i})">Quiz</button>
      </div>
    `;
  }

  document.getElementById("modulesContainer").innerHTML = content;

  // Functions
  function openPractice(module) {
    alert("Opening Practice for Module " + module);
  }

  function openQuiz(module) {
    alert("Opening Quiz for Module " + module);
  }
</script>

</body>
</html>
